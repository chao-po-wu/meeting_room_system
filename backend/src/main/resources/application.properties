spring.application.name=meeting-room

# ---- H2 in-memory database ----
spring.datasource.url=jdbc:h2:mem:meetingroom;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable open-in-view so lazy loading only happens inside @Transactional service methods.
spring.jpa.open-in-view=false

# ---- H2 web console at http://localhost:8080/h2-console ----
spring.h2.console.enabled=true

server.port=8080
